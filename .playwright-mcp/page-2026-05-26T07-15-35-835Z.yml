            - generic [ref=e6261]:
              - generic [ref=e6262]:
                - paragraph [ref=e6263]:
                  - text: 由三原塔翻新小组制作的50层魔塔（H5）-2026全新复刻版于2026年元旦正式发布！
                  - text: 【更新内容详解】
                  - link "https://h5mota.com/bbs/thread/?tid=1790&p=1" [ref=e6264] [cursor=pointer]:
                    - /url: https://h5mota.com/bbs/thread/?tid=1790&p=1
                  - text: 翻新内容概述：
                  - text: 1、玩家开局需自选是否开启flash原版特性。若选择开启则进入特性版，可使用对话穿墙\穿门\穿怪，可使用破墙偷雪花，32F打不过骑士队长可使用圣水复活。若选择不开启则进入纯净版，无法对话穿墙，雪花在击败魔龙后才会出现，32F打不过骑士队长会直接死亡。
                  - text: 2、新增封印真魔王结局。Flash原版中，若不打49F假魔王，而是先救公主，然后通过24F的通道上50F，和小偷对话让真魔王现身，此时立即使用下楼器到49F封印假魔王，然后再次跑到24F的通道上50F，发现真魔王也被封印为一成功力。2026全新复刻版中，将此封印真魔王的特性还原，并将其设定为真结局（TE）。
                  - text: 3、新增64个榜单。2026全新复刻版可选择纯净版或特性版，也可选择打出普通结局或真结局，上述两两组合共4种情况，在每一种情况下，均设置16个榜单：最高血量、最高攻击、最高防御、最多金币、最高攻防和、最多商店加点次数、最多留怪数量、最低攻击、最低防御、最低攻防和、最少商店加点次数、最多黄钥匙、最多蓝钥匙、最多红钥匙、最多道具数量、最高血量（疯狂加血模式）。因此，全塔共有4*16=64个榜单。
                  - text: 4、还原大量原版设定，还原UI界面，将像素图标高清化等。
                  - text: 5、增加大量方便玩家的设定：开局送弱化版楼传（经过的每一层都需要完全联通才允许传送）、自动清零伤怪、自动拾取物品等。
                  - text: 【50层魔塔-2026年全新复刻版贡献名单】
                  - text: 游戏性更新/bug主力修复：大化术士
                  - text: 版本区别查找/bug主力测试：哀的决意
                  - text: bug辅助测试：真魔、冰璃、盐铁桶子
                  - text: 开局楼传技术支持：艾露达
                  - text: 发布流程支持：王州、冰璃、鹿间裕贵
                  - text: 新版本宣传：盐铁桶子、超级火柴人
                  - text: 【鸣谢复刻之前版本的前辈】
                  - text: 艾之葵、鹿间裕贵、641、数码宝贝51
                  - text: 【来自大化术士/艾露达的热心提示】
                  - text: 不推荐直接用此50层魔塔翻新版造mod（因为覆写了很多程序，容易出bug）。如您想造mod，推荐进Q群953750123，领取大化术士的新版50层样板黄金典藏版。
