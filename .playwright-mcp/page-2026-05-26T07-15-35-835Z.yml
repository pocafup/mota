              - paragraph [ref=e7885]:
                - text: 留名纪念，从小玩到大的魔塔玩家
                - text: 儿童阶段：2004年4岁时入坑24层魔塔（一直到18岁都以为只有21层），2007年入坑新新魔塔（不知道可以鉴定章，玩到地下17、18层被打爆），2008年入坑疯狂加血版50层魔塔，2009年通关24层魔塔假结局（21层结局），2011年通关新新魔塔（贤者、勇者、霸者均通关），同年通关疯狂加血版50层魔塔。
                - text: 中学阶段：2013年入坑新新魔塔2（被吊打），对新新魔塔2和魔塔50层有阴影，一直没有再次挑战。同年入坑魔塔吧，偶尔会玩一些魔塔作品，这个期间感觉有些作品的质量是真的高。
                - text: 本硕阶段：2018年才知道24层魔塔boss是血影并通关，2021年因宿命系列回坑，2023年入坑h5魔塔。
                - text: 上班阶段：2024年关注桶子，2025年通关h5的不用打白银系怪物的新新魔塔2（居然感觉很简单，但是Flash版至今都打不过，因为打不好白银系怪物），2025.6.1通关50层魔塔。
                - text: 正好是6.1儿童节，为童年画上句号。当然魔塔玩不腻，估计会一直玩下去。
