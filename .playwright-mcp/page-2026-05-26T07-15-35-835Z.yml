                  - text: 13-1【纯净版-NE（最低攻击）】297攻击；
                  - text: 耗时：10小时
                  - text: 难度评级：思路B，转换A
                  - text: 粗略思考路径：1、探路阶段分析，如果想最终成绩310以下则必须跳大法师，方案一【地震救公主+破墙偷炸弹】，方案二【地震震37F+破墙省1红+对称飞省2红】，由于由于纯净版无法偷雪花，走方案一的情况下神圣盾会在地震卷轴之前获取，对称飞没有特别好的飞点，最终成绩远不如方案二。2、探路再次发现，在未拿取圣剑和神圣剑的情况下，无法击杀黑暗武士，因此49F的黑暗武士必须想办法跳过，如果在48F使用上楼器，则需要用下楼器来拿神圣盾，进而舍弃幸运金币，亏损高达5000血左右。3、综合考虑，地震用在37F，破墙用在49F（省1红并跳2个黑暗武士），第一次对称飞用在40F，后两次用在45F双飞取上楼器；4、分两条大路线分别测试【二区2攻】和【二区2攻1防】对后续损血的影响，在此基础上再分别测试【四区2攻攻杀双手剑士+后期舍弃16攻红宝石】与【四区爆防硬刚双手剑士】两条路线，可显而易见得出最优加点方案。5、在上述加点方案和决战前剩余金币的基础上，测试加出最后一次3440档属性的影响，发现强行省钱加出3440档属性血量亏损巨大，因此可放弃3440档属性，前期适当咸钥匙并击杀大量怪物，只要保障黄钥匙足够冲到地震卷轴商人处，并持有4000金币即可。6、在上述基础上微调前期的蓝钥匙和黄钥匙用法，由于后期金币盈余较多，可在中期就购买31F的1蓝3黄钥匙、38F的3黄钥匙；最后决战魔王后剩极少量血，容错较小。
                  - text: 13-2【纯净版-TE（最低攻击）】251攻击；
                  - text: 耗时：3小时
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段发现，由于纯净版无法偷雪花，必须硬刚魔龙，因此最低攻击必为251，因此方向为防杀魔龙并跳大法师。2、思考地震救公主和硬凑4红钥匙两条路线的区别，用于防杀魔龙必须在低攻的情况下拿到神圣盾，因此必须获取炸弹，以此逆推破墙和地震的用法。3、选择合适的+3%攻防时机，卡好打魔龙前的攻击力为251，并尽力凑钱加防，最终可以实现完美防杀魔龙。
                  - text: 13-3【特性版-NE（最低攻击）】293攻击；
                  - text: 耗时：2小时（另有2小时研究290攻击失败）
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段根据魔王损血，锁定最终成绩的的范围在290攻-300攻之间；2、分析道具用法，显而易见地震卷轴用于救公主，破墙用于破炸弹，前两次对称飞用于偷神圣剑，第三次对称飞用于40F（放弃圣剑）；3、由于后期攻击力溢出且四区能偷剑，因此除了二区加2攻对付石头人，后续只加防御，残局卡500防左右，剩余金币全加血；4、根据残余金币数量，在加出3440属性的基础上，逆推前期的蓝钥匙和黄钥匙用法，注意拿到幸运金币前的强行凑钱之前的金币与血量的转换。
                  - text: 尝试突破的废案：改变后期舍弃红宝石的数量，控290攻决战魔王，但最终差500血左右，无法突破。
                  - text: 13-4【特性版-TE（最低攻击）】131攻击；
                  - text: 耗时：1小时
                  - text: 难度评级：思路D，转换D
                  - text: 粗略思考路径：1、探路阶段发现，特性版可破墙偷雪花，因此只需拿到下楼器并跳大法师即可，地震显而易见用于救公主。2、选择合适的+3%攻防时机，卡好加攻吃宝石后攻击为131，舍弃之后的红宝石，并尽力凑钱加防，可轻松防杀红衣巫师，最后有大量血量盈余，即便49F被夹击4次也能轻松过关。
                  - text: 14-1【纯净版-NE（最低防御）】25防；
                  - text: 耗时：10小时（另有5小时研究24防失败）
                  - text: 难度评级：思路B，转换A
                  - text: 粗略思考路径：1、探路阶段发现，由于纯净版无法偷雪花，且必跳大法师，显而易见地震卷轴用于37F，破墙用于48F取圣剑，对称飞用于40F，42F，47F，下楼器用于获取幸运金币，上楼器用于24F飞入决战通道。2、决战假魔王前需达到330攻以上，尽可能少费血清理初高级巫师。3、仔细研究一二区的蓝门和加点策略，并区分【买12F红钥匙】与【不买12F红钥匙】两条路线分别研究，由于绕骑士剑依然存在较大损耗且多消耗2蓝钥匙，因此显而易见需硬冲骑士剑，整条路线在33F获取骑士剑、最终决战真魔王时均存在卡血，转换难度较高。
                  - text: 尝试突破的废案：尝试1区少吃1个蓝宝石，但会额外消耗2把黄钥匙，导致从骑士剑开始金钱周转出现问题，负向滚雪球最终距离战胜魔王约差2000血。
                  - text: 14-2【纯净版-TE（最低防御）】22防；
                  - text: 耗时：20小时（另有5小时研究21防失败）
                  - text: 难度评级：思路B，转换A
                  - text: 粗略思考路径：1、探路阶段发现，由于纯净版无法偷雪花，必须在没有屠龙匕的情况下硬刚魔龙，并且必跳大法师，显而易见地震卷轴用于37F，破墙用于48F取圣剑，对称飞用于40F，47F，25F（飞入决战通道），下楼器用于50F封印魔王，上楼器用于24F二次飞入决战通道。2、决战魔龙前需达到330攻以上尽可能少费血清理初高级巫师和魔法警卫，加出第13次祭坛加点（1580档属性）以及1000金币2000血。3、仔细研究一二区的蓝门和加点策略，并区分【买12F红钥匙】与【不买12F红钥匙】两条路线分别研究，由于绕骑士剑依然存在较大损耗且多消耗2蓝钥匙，因此显而易见需硬冲骑士剑，整条路线在20F击杀吸血鬼、33F获取骑士剑、40F击杀骑士队长、35F决战魔龙、49F被夹击四次击杀假魔王时均存在卡血，转换难度较高。
                  - text: 尝试突破的废案：一区少吃1个蓝宝石，使用22防的加点和开蓝门策略，则无法战胜吸血鬼，若强行开20F右侧蓝门硬杀吸血鬼则卡死在骑士剑处。
                  - text: 14-3【特性版-NE（最低防御）】13防；
                  - text: 耗时：5小时（另有3小时尝试12防失败）
                  - text: 难度评级：思路C，转换B
                  - text: 粗略思考路径：1、探路阶段发现，只需带着破墙冲到神圣剑处，特性版NE后续可跳过大法师和魔龙。但由于没有神圣盾，49F一定被夹击（炸掉一个魔法警卫可从被夹4次变成被夹3次）；假魔王最低耗血487，因此夹击前需耗血3896，所以节省下圣水约省4000-5000血；若不留圣水到49F，发现肯定打不过50F真魔王。2、大思路就确定为：前期在极低防御下极限省血，并留下圣水到49F假魔王处。2、由于13防御相比11防御前期有一定血量优势，因此选择【一区加2攻】路线，并分别研究【开4F蓝门】以及【从4F右上对话穿墙进商店】的优劣，从冲到骑士剑处的损血量确定加点路线。3、规划50金币和200金币的钥匙商人购买时机（不能太早购买，宝贵的金币需优先加能力）；4、分析骑士剑位置的特点，分析【绕着拿骑士剑】和【硬冲骑士剑】两条路线的大概耗血和钥匙特点（与4F是否咸蓝存在联动），可硬冲到骑士剑处，再拿取4黄钥匙进行血量周转，此时大概200-300血左右容错，有一定转换难度。
                  - text: 尝试突破的废案：尝试突破至12防御的方案：1、一区加2攻不咸4F蓝门（需提前购买50金币5黄钥匙，但不能提前购买50金币1蓝钥匙，并在一区多咸黄门）；2、一区加2攻咸4F蓝门，不开20F右侧蓝门，绕着拿骑士剑；3、一区加2攻咸4F蓝门，开20F右侧蓝门和32F左上蓝门，硬冲骑士剑。12防情况下，以上三条大路线冲击骑士剑时都差200-300血左右，难以突破。
                  - text: 14-4【特性版-TE（最低防御）】11防；
                  - text: 耗时：10小时
                  - text: 难度评级：思路C，转换A
                  - text: 粗略思考路径：1、探路阶段发现，只需带着破墙冲到神圣剑处，特性版TE后续可跳过三大boss，因此大思路就确定为：前期在极低防御下极限省血。2、分别尝试【一区加2攻】和【一区加3攻】两条路线，并分别研究【开4F蓝门】以及【从4F右上对话穿墙进商店】的优劣，从冲到骑士剑处的损血量确定加点路线。3、利用好圣水复活，规划50金币和200金币的钥匙商人购买时机（不能太早购买，宝贵的金币需优先加能力）；4、分析骑士剑位置的特点，分析【绕着拿骑士剑】和【硬冲骑士剑】两条路线的大概耗血和钥匙特点，较容易得到结论。5、重头规划蓝钥匙用法，利用好圣水复活的特性并极致卡血，可硬冲到骑士剑处，再拿取4黄钥匙进行血量周转，此时大概100血左右容错，有一定转换难度。
                  - text: 尝试突破的废案：尝试突破至10防御：无法在上述路线的情况下通过一区（即便耗尽资源还差30血），如果改变加点大路线则二区损耗过大，无法冲到骑士剑处，因此难以突破。
                  - text: 15-1【纯净版-NE（最低攻防和）】462攻防和；
                  - text: 耗时：10小时（另有5小时研究461防失败）
                  - text: 难度评级：思路B，转换A
                  - text: 粗略思考路径：1、分析决战最佳攻击力，锁定最终攻击力方案为390（秒杀黑暗骑士）或430（秒杀白衣武士后拿神圣剑），经探路发现前者需将破墙用在49F用两刀临界强打5个白衣武士，即便前期能多40防御，但二区以后的防御收益不高，无法弥补49F的夹击损耗以及决战真魔王的攻防配比损耗，因此锁定最优决战攻击力为430。2、由于纯净版无法偷雪花，且必跳大法师，显而易见地震卷轴用于37F，破墙用于48F取圣剑，对称飞用于40F，42F，47F，下楼器用于获取幸运金币，上楼器用于24F飞入决战通道。3、决战假魔王前需达到330攻以上，尽可能少费血清理初高级巫师。4、仔细研究一二区的蓝门和加点策略，并区分【买12F红钥匙】与【不买12F红钥匙】两条路线分别研究，由于绕骑士剑依然存在较大损耗且多消耗2蓝钥匙，因此显而易见需硬冲骑士剑，整条路线在33F获取骑士剑、最终决战真魔王时均存在卡血，转换难度较高。
                  - text: 尝试突破的废案：尝试1区少吃1个蓝宝石，经优化转换后距离战胜魔王仍差约100血。
                  - text: 15-2【纯净版-TE（最低攻防和）】352攻防和；
                  - text: 耗时：3小时（在最低防御22防的基础上）
                  - text: 难度评级：思路B，转换A
                  - text: 粗略思考路径：1、探路阶段发现，由于纯净版无法偷雪花，必须在没有屠龙匕的情况下硬刚魔龙，并且必跳大法师，显而易见地震卷轴用于37F，破墙用于48F取圣剑，对称飞用于40F，47F，25F（飞入决战通道），下楼器用于50F封印魔王，上楼器用于24F二次飞入决战通道。2、决战魔龙前需达到330攻以上尽可能少费血清理初高级巫师和魔法警卫，加出第13次祭坛加点（1580档属性）以及1000金币2000血。3、仔细研究一二区的蓝门和加点策略，并区分【买12F红钥匙】与【不买12F红钥匙】两条路线分别研究，由于绕骑士剑依然存在较大损耗且多消耗2蓝钥匙，因此显而易见需硬冲骑士剑，整条路线在20F击杀吸血鬼、33F获取骑士剑、40F击杀骑士队长、35F决战魔龙、49F被夹击四次击杀假魔王时均存在卡血，转换难度较高。
                  - text: 15-3【特性版-NE（最低攻防和）】403攻防和；
                  - text: 耗时：15小时
                  - text: 难度评级：思路A，转换S
                  - text: 粗略思考路径：1、探路阶段发现，只需带着破墙冲到神圣剑处，特性版NE后续可跳过大法师和魔龙，大思路就确定为：前期在极低防御下极限省血，并留下圣水到假魔王处。2、选择【一区加2攻】路线，并【从4F右上对话穿墙进商店】。3、规划50金币和200金币的钥匙商人购买时机（不能太早购买，宝贵的金币需优先加能力）；4、分析骑士剑位置的特点，分析【绕着拿骑士剑】和【硬冲骑士剑】两条路线的大概耗血和钥匙特点，可硬冲到骑士剑处，并根据决战攻击力逆推四区加攻击力的次数，剩余金币在商店加血。5、根据中期卡钱和决战前的黄蓝钥匙，逆推前期咸门数量，修改钥匙使用方式，最终战胜魔王剩19血容错，应该是唯一路线。
                  - text: 15-4【特性版-TE（最低攻防和）】225攻防和；
                  - text: 耗时：10小时
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段发现，魔法警卫两刀临界为215，三刀临界为177，由于最低防御只有11，因此想打出225攻防和必然不能踩到两刀临界。2、分析四区所有怪物的临界，发现最优攻击力只可能为190（踩到吸血蝙蝠）或197（踩到红衣巫师）或200（踩到史莱姆王），由于25防御以后再加防带来的血量滚雪球作用不大，经尝试发现最优攻击力为200。3、分析核心道具用法，由于拿神圣剑会导致攻击力超标，因此可用第一次对称飞用于40F，第二次和第三次对称飞用于双飞偷雪花，破墙用于49F（可实现分段式在被夹击4次的情况下击杀四个魔法警卫），地震救公主，下楼器用于封印魔王，放弃上楼器、幸运金币、圣剑、圣盾、神圣剑、神圣盾。2、逐步摸索二区和四区加点策略，以及【绕着拿骑士剑】和【硬冲骑士剑】两条路线的大概耗血和钥匙特点，可硬冲到骑士剑处，根据五区所需钥匙数量逆推前期钥匙用法，修改钥匙使用方式，最终战胜四个夹击魔王警卫后还需上50F打败被封印的真魔王（耗血266），最后剩丝血容错，转换难度较高。
                  - text: 16-1【纯净版-NE（最少商店加点次数）】5次；
                  - text: 耗时：2小时
                  - text: 难度评级：思路C，转换B
                  - text: 粗略思考路径：1、探路阶段发现，纯净版不能破墙偷雪花，在前期加点极少的情况下需撑过四区，拿到屠龙匕再打魔龙，同时需硬凑3红钥匙救公主，用上楼器跳24F红门，从而跳大法师；2、在二区加2次攻击、四区加3次的基础上，四区破墙用在37F提前拿宝石，五区速拿神圣盾，并将所有蓝钥匙和黄钥匙尽可能咸掉换血，最后可以战胜魔王但容错不高，有转换难度（约100血容错）。
                  - text: 尝试突破的废案：尝试四区加点2次，破墙用在38F，可以勉强省下圣水，但由于需【2次对称飞】或【1对称飞1上楼器】才能取圣剑，前者在47F上楼时强杀巫师大量掉血，后者取上楼器时强杀黑暗武士大量掉血，最终都无法战胜魔王（约差7000血）。
                  - text: 16-2【纯净版-TE（最少商店加点次数）】4次；
                  - text: 耗时：2小时
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段发现，纯净版不能破墙偷雪花，必须硬刚魔龙，同时需硬凑4红钥匙救公主和开24红门，从而跳过大法师；2、在二区加2次攻击、四区加2次的基础上，四区破墙用在38F省红门，五区速拿神圣盾，并将所有蓝钥匙和黄钥匙尽可能咸掉换血，最后可以险胜魔龙；但容错不高，有些许转换难度（约几百血容错）。
                  - text: 16-3【特性版-NE（最少商店加点次数）】2次；
                  - text: 耗时：2小时
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段发现，特性版可破墙偷雪花，可硬凑3红钥匙救公主，用上楼器（或对称飞）跳24红门，从而跳过大法师；2、在二区加2次攻击的基础上，四区速拿神圣剑，五区速拿神圣盾，可不在之后的商店加点，将所有蓝钥匙和黄钥匙尽可能咸掉换血，最后可以险胜魔王；但容错不高，有些许转换难度（约几百血容错）。
                  - text: 16-4【特性版-TE（最少商店加点次数）】2次；
                  - text: 耗时：1小时
                  - text: 难度评级：思路D，转换D
                  - text: 粗略思考路径：1、探路阶段发现，特性版可破墙偷雪花，因此只需拿到下楼器并跳大法师即可，地震用于救公主，最后有大量血量盈余，无转换难度（也可以地震37F，拿神圣盾强打大法师，也有几千血盈余）。
                  - text: "------------------以下为旧版本信息------------------"
                  - text: 【50层魔塔-2018-2025年版本】通关笔记
                  - text: 1、NE穿墙 28803
                  - text: 视频地址：
                  - link "https://www.bilibili.com/video/BV1BZBaB7E3i" [ref=e7628] [cursor=pointer]:
                    - /url: https://www.bilibili.com/video/BV1BZBaB7E3i
                  - text: 耗时：30小时（由流逝大佬单独首创，之后我受其微指点花30小时打出）
                  - text: 难度评级：思路S，转换A
                  - text: 粗略思考路径：1、探路阶段，思考中心对称飞行器、地震卷轴和炸弹的用法，大体估计二区和三区的加点次数范围。2、分别测试二区加两次和加三次的路线，发现最终成绩距离不大，后续需分为二区加两次和二区加三次两条大路线分开研究。3、先全局规划蓝钥匙的用法，再根据金币尾数调整黄钥匙用法，依靠幸运金币和黄钥匙买卖周转，尽可能将决战前的金币转换为血量。
                  - text: 进阶提示（突破一定成绩后可看懂）：1、中期有两次强行凑钱，凑钱之前卖掉黄钥匙的多少才是决定最终剩余金币的关键。由于两次强行凑钱的存在，幸运金币在本榜单发挥的效果较反常识，并非“币前留下的怪物的钱翻倍”，而是和“该怪物是否在拿币的必经之路”上，以及黄钥匙周转都密切相关。2、突破B站公开成绩28796的关键是要打破全局思维定式并从头规划大路线，只抠小转换是无法突破28796的，从某种程度上来说，28796应该是在原本的大路线里已做到完美。
                  - text: 尝试突破的废案：尝试再次调整决战前剩余资金，但受限于全塔资源，已无法突破。
                  - text: 2、TE穿墙 19789
                  - text: 耗时：25小时
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段，思考中心对称飞行器、地震卷轴和炸弹的用法，大体估计二区和三区的加点次数范围。2、分别测试二区加两次和加三次的路线，分别测试买12F红钥匙和不买红钥匙的路线，通过观察金币大致尾数逐步锁定加点方案、对称飞用法、是否买12F红钥匙的大路线。3、全局规划蓝钥匙的用法（可通过转换耗血估算，但注意拿到骑士盾之前蓝钥匙价值较高，拿到骑士盾之后价值锐减）。4、全局规划黄钥匙的用法，尽可能将决战前的金币转换为血量。
                  - text: 尝试突破的废案：1、二区多加一次防，三区少加一次防，二区多获得的血量不足以支撑三区和决战三大boss的消耗，最终成绩约19200。2、二区多加一次攻，不买12F红钥匙，三区加点次数不变，对称飞用在40层，可以提前踩双手剑士的150攻击临界，决战前加10攻击踩魔王408攻击临界，但二区强打三兽人武士损耗较高，决战三大boss的防御也有所下降，决战前也有溢出的金币无法转换为血量，最终成绩约18500。
                  - text: 3、NE不穿墙 27087
                  - text: 视频地址：
                  - link "https://www.bilibili.com/video/BV1jtv6BFEvN/" [ref=e7629] [cursor=pointer]:
                    - /url: https://www.bilibili.com/video/BV1jtv6BFEvN/
                  - text: 耗时：25小时
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段，发现想加出商店最后一次2000生命，金币极为紧俏，因此区分加出3820金币和不加出3820金币两条大路线分别研究测试。2、测试二区加两次和加三次的路线，因为提前偷神圣剑导致四区不需要加攻击力，因此可从最终决战三大boss的最优防御值反推二区加点方案，该加点方案均适用于两条大路线。3、加出3820金币情况下，需优先规划蓝钥匙和黄钥匙用法，通过结局前黄门血瓶逆推中期可以出售的黄钥匙数量，中期加740金币时极为缺乏金币，需通过决战前金币尾数转换金币和血量。4、不加出3820金币情况下，决战前金币溢出较多，可在中期未获得幸运金币前多清0伤怪，以获取中期尽可能多的黄钥匙周转，通过决战前金币尾数转换金币和血量，开完全塔的血瓶黄门。5、比较两条大路线的血量更优者，从头再次优化蓝钥匙的用法，需要全局优化并打破定式思维才能发现一个其他榜不适用的盲点，才可将成绩提升至27050以上。
                  - text: 尝试突破的废案：在确定最优加点方案、选择好是否加出3820金币大路线的情况下，穷举全塔蓝钥匙用法，发现目前的蓝钥匙奇异方案有其他榜单都不适用的绝佳好处，因此难以再突破。
                  - text: 4、TE不穿墙 17735
                  - text: 耗时：25小时
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段，发现想加出商店最后一次1600生命，金币紧俏，需要不买12F红钥匙才能做到，以此推出过35F前必须凑够150攻击击杀双手剑士，以此推出二区和三区合计加攻击的最低次数，并确定对称飞的固定用法。2、分别测试二区加两次和加三次的路线，规划吸血鬼前永久消耗的黄钥匙情况，在取得地震卷轴前黄钥匙非常紧俏，以此推出加点策略。3、全局规划蓝钥匙和黄钥匙用法，残局多余黄钥匙转换为血量。
                  - text: 尝试突破的废案：1、修改9F与37F蓝钥匙的用法，但中期周转无法弥补损失。2、节省一区周转钥匙的数量，保留多余的黄钥匙用在36F，但遗憾的是吸血鬼前血量不够，不交黄钥匙需要多打高级法师凑血，最终成绩只有17690左右。
                  - text: 5、疯狂加血版 8842783
                  - text: 耗时：5小时
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段，发现每个阶段的最优攻击临界点，记录好商店加点次数，初步规划上下楼器、中心对称飞行器的用法。2、列举核心道具破墙稿和地震卷轴的使用位置的几个选择，对分歧大的大路线逐一测试；3、规划蓝钥匙和黄钥匙的周转，尤其关注一区黄门的打开数量和打开时机。
                  - text: 尝试突破的废案：1、尝试结局前191攻打魔王，上50楼前只能加到380万血，即便尽可能吃防，魔王伤害也只能降到500多万，仍然无法开战。2、尝试结局前192攻打魔王，但不足以弥补大法师和黑暗骑士的吸血损失。3、破墙用在35层直接上楼（不是偷雪花），躲中级卫兵110的临界，但需105攻跨过红骑士临界才能上五区，不足以弥补67攻杀吸血鬼造成的三区损失。4、前期多省钥匙，不买41层1000元的钥匙，打完高级卫兵后拿神圣盾和后面的血瓶，清光白衣后多加一次1800血，但不足以弥补前期省钥匙的损失。
