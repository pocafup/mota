                      - paragraph [ref=e7199]:
                        - text: "Re #164373: 有没有一种可能，那第五把红钥匙是用来开自己屋门的？而且我还有别的证据，大法师层墙壁和大法师站位恰好是五点封印的布局，这就意味着大法师知道如何封印魔王，甚至封印术可能就是他为了收租创造出来的"
                        - text: 至于“杀死入侵者”的对话，正是因为他看到了他楼上楼下邻居的红门，知道勇士为了击败魔王，必然会抢夺他的钥匙开启这些门，所以才会这么做
                        - text: 至于为什么不和勇者一起杀死魔王？因为杀死魔王所带来的收益远不如持续收租细水长流来得多啊
                        - text: 然后你问那些BOSS都被打死了怎么收租？因为他们根本没死，不过是他们被魔王命令给勇士掉落一些金钱，之后魔王就会把他们传送到3区，看似厚厚的墙面，无用的布局，里面可是有勇士看不到的隐藏空间，要不然魔塔也不会有三区这个看似尴尬无用的区域了，关于没有死的问题也有证据：因为死人是不会说话的，骷髅队长战后的“稍有不慎必死无疑，吸血鬼的“你牛但穞更牛”，和骑士队长演都不演的临阵脱逃都在表明他们其实没死，同样，那些老人也是魔王的布局，是同样的传送手法
                        - text: 为什么魔王甘愿给勇士金钱而不去派兵攻打大法师？大法师会封印，魔王打不过，而商店和宝石怪物又不能用，因此魔王必须要培养一个勇士来击败大法师，这里虽然没有直接证据但是有间接证据，你看看别的魔塔阻击怪遇见宝石血瓶都是不会吃的，宁愿挨打也不会去吃，另外，因为有商店的存在，所以勇士的钱塔内赚，塔内花，最终还是会回到魔王的手中，即使勇士最后真的剩几百几千带回去，那也比反复无常的交租要来的划算
                        - text: 所以全塔唯一一个真正死亡的角色就是大法师，你问魔王为什么不会死？旧版H5 50层NE剧情已经说明了，魔王留好了后手，算计好勇士会击败自己，但是大概率会不能封印自己，所以魔王过一段时间后就又能卷土重来
                        - text: 那么应该分为4个结局，跳穞不封=收租结局，魔王只能无奈的继续交租，跳穞封印=穞哥泪流满面结局，只能含泪成为魔塔共主，无法享受收租的幸福生活，打穞不封=魔王不用交租的快乐结局，打穞封印=魔族灭绝结局，再没有大能能够复活魔物，3区迟早会被人发现并摧毁
                        - text: 好的，我编不下去了，大化术士才是魔塔的主人，50层魔塔最好玩的地方就是你可以随便魔改剧情，狗头保命
