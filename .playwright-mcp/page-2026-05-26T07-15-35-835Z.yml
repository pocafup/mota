                - text: 2020.01.16更新 【51层魔塔】【50层魔塔】译名和穿墙解释 修复大概10个bug 增加记事本等
                - text: 以下都是【数码宝贝51】写的 解释一下
                - text: 为什么叫【51层魔塔】或者【50层魔塔】
                - text: 除了算0层 还有其他原因 flash作者发布网站写的也是
                - text: 【益智游戏共51层】发布地址翻墙才能进 知道的人太少了 作者也说了 能穿墙是因为他偷懒少做了1帧
                - link "https://web.archive.org/web/20040408001312/http://www.flashempire.com/theater/top10.php?id=2577" [ref=e12505] [cursor=pointer]:
                  - /url: https://web.archive.org/web/20040408001312/http://www.flashempire.com/theater/top10.php?id=2577
                - text: 还有就是新浪游戏大厅的译名是【新版51层魔塔中文版】他的全屏地址到现在都可以玩（在线玩需要支持flash的浏览器）
                - text: 我第一次发布到h5就用的【新版51层魔塔中文版】小艾觉得太长才改成了【51层魔塔】
                - text: 然后没多久我就知道了flash作者发布网站的秘密 但是怕有人吵不敢公开 不过现在是时候公开这些秘密了
                - link "http://wanwan.sina.com.cn/downgames/littlegame/flash2004-11-25775.shtml" [ref=e12506] [cursor=pointer]:
                  - /url: http://wanwan.sina.com.cn/downgames/littlegame/flash2004-11-25775.shtml
                - link "http://image2.sina.com.cn/gm/downgames/littlegame/U153P115T33D775F646DT20041125152518.swf" [ref=e12507] [cursor=pointer]:
                  - /url: http://image2.sina.com.cn/gm/downgames/littlegame/U153P115T33D775F646DT20041125152518.swf
                - text: 因为是10年前的东西 知道里面那些flash游戏的人很少 但是知道4399和好记星的【50层魔塔】的人很多 就是这样了www
                - text: 继续补充 如果早点把50层改成51层 我可能早就测试了 这次测出这么多bug也让我震惊 和5月2日说的没bug完全不同
                - text: 如果再给我3天的时间 大概就能测试完了 就不会出现这么多 甚至现在无法修复和挽回的bug了！！！
                - text: flash作者的发布网站 作者写了共51层 也没写50层 和作者回复了穿墙是bug 这个是2018年3月 发布h5后才知道的
                - text: 我怕有人因为穿墙吵起来 一直没有公开 没想到连译名都会这样 是时候公开了吧
                - text: 现在我已经把flash作者发布网站公开在论坛和评论区 译名和穿墙的锅让他背吧
                - text: 2020.01.16 我用了至少3天的时间 终于再次同步测试完了 本次更新修复了大概10个bug
                - text: 修复2层直接显示小偷的bug【改成29层对话后显示】
                - text: 修复41层可以从其他地方撞出高级巫师的bug【只能从左边撞出来】
                - text: 修复42层一个地方可以破墙的bug【换一个不能破的图块】
                - text: 修复42层一个地方可以飞的bug【加了事件来挡住】
                - text: 修复43层一个地方可以破墙的bug【换一个不能破的图块】
                - text: 修复49层可以用上楼器的bug【49层禁用上楼器】
                - text: 修复50层可以用下楼器的bug【50层禁用下楼器】
                - text: 修复用炸弹后不打开45层和49层的机关门的bug【49层魔王出现后 用炸弹也不会再次打开机关门】
                - text: 8层右下角的黄钥匙和蓝钥匙位置反了【很小的bug】
                - text: 50层的魔王金币不是1000【金币改成500】
                - text: 47层5,4位置的高级巫师不是阻击【如果以前没拿神圣盾就打 重新播放录像会多200血】
                - text: 5层道具增加记事本 可以记录对话【用的我的事件流 可以循环翻页 取消魔龙史记】
                - text: 优化部分对话【不影响对话的意思】
                - text: 增加封印魔王时的动画效果【te结局才有】
                - text: 由于不影响游戏所以不修复的bug：
                - text: 到17层时位置不对【不能修复 没用还影响录像】
                - text: 到34层时位置不对【不能修复 没用还影响录像】
                - text: 0层上到1层时位置不对【不能修复 没用还影响录像】
                - text: 20层左上角的红宝石和蓝宝石位置反了【很小的bug，疯狂加血版可能影响录像】
                - text: 4层初级法师的位置不对 应该往下移动2格【很小的bug 可能影响录像 鼠标操作的更容易出错】
