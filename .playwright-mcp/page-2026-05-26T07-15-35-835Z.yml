                - paragraph [ref=e8196]:
                  - text: 打了十几座mod塔，才想起来自己没有正儿八经的通关过原版，小时候只跟着攻略懵懵懂懂的打过。
                  - text: 算是一个弥补童年的故事。
                  - text: 撞了一个TE不穿墙8000多分，很菜。
                  - text: 总的来说由于最初汉化版搬运的缺失（36暗道，48守卫），不穿墙TE还是需要一定的水平的，至少不像24层那样新人了解一下坑点（指红蝙蝠）就能随便打。
                  - text: 但是整体来说不算太牢，一二区血瓶处在刚刚好够的程度（没有细抠，细抠的话应该可以留一些）
                  - text: 几个点
                  - text: 1. 1区不加，2区2攻1防，4区3攻2防，应该可以优化
                  - text: 2. 由于没有幸运金币，0伤怪全部可以不留，所以金币反而不那么抠搜
                  - text: 3. 36层没有暗道，需要硬打双手剑士，我是选择了堆150攻，后面看看有没有更好的方法
                  - text: 4. 镐头不能用+圣剑没有守卫=双飞必须留给圣剑，加上飞骑士队长，41层只能吃夹击，地震卷轴也只能硬上
                  - text: 5. 蓝钥匙真的缺，如果能从前面抠出一把蓝钥匙给46的商店，感觉会非常成功
