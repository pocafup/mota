            - generic [ref=e7623]:
              - generic [ref=e7624]:
                - paragraph [ref=e7625]:
                  - text: 【50层魔塔-2026全新复刻版】通关笔记
                  - text: 通关进度：52/64
                  - text: 1-1【纯净版-NE（最高血量）】26164血；
                  - text: 耗时：100小时（花费较多时间在其他加点方式的歧路上）（感谢gyq大佬的指点）
                  - text: 难度评级：思路S，转换S
                  - text: 粗略思考路径：1、探路阶段发现，加出3820档属性代价巨大，因此主攻路线为前期清怪加点省血，并放弃3820档属性。2、首先尝试【破墙破圣剑】和【破墙破炸弹】两条大路线分别研究，并调整蓝钥匙的用法和四区加点策略（主要目标都是攻杀双手剑士），找出两条大路线下的最优钥匙分配思路。3、比较两条大路线决战前的血量，发现【破墙破炸弹】路线四区可免受大量魔法伤害更优，对称飞用于40F、48F、48F。 4、比较二区加点大路线的优劣势：【两攻】线四区可多出16防御大量减伤，并可完美防杀鬼战士和中级卫兵，且有足够的能力硬冲骑士剑，从而节省下中期宝贵的黄钥匙用于周转，为最优加点思路。【两攻一防】线可在二区省下约800血，可通过前期强行省黄钥匙，在硬冲骑士剑前硬凑出920金币的加点，多加一次16防御，代价是决战前需少加一次血，且五区针对2个怪王和2个高级巫师的减伤不如【两攻】线，最高只能达到26147。【三攻】线的优势在于四区可只加一次攻击，通过省下32F蓝钥匙开40F蓝门拿红蓝宝石，但拿骑士剑前需要多打两个骑士，最终只能达到26020左右。5、在【两攻】线估算各黄门收益对血量和中期金币的影响，利用决战前金币数和黄钥匙数量逆推中期杀的非必经之路上的怪物，尽可能少杀以谋求残局需拿完全塔所有血瓶，并加出最后的3440金币加点。6、从26162突破至26164，只需注意硬凑740金币时的黄蓝钥匙和金币转换即可。
                  - text: 1-2【纯净版-TE（最高血量）】41477血；
                  - text: 耗时：10小时
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段发现，由于纯净版无法偷雪花，必须在没有屠龙匕的情况下硬刚魔龙，由于大法师的属性特点，爆攻杀魔龙和大法师的损伤极高，因此区分【二区四区各加2攻】与【二区加2攻 四区全加防】两条路线分别研究；2、在加出2420档属性和1000金币2000血的基础上，买12F红钥匙路线的金币比较紧俏但勉强够用，而不买12F红路线的金币有所富裕，一二区黄钥匙可多咸黄门，但在四区攻击力不足的路线下，需面临需多打双手剑士的困境，综合考虑为买出12F红钥匙更优。3、由于极限爆防时的属性和高于魔龙，经研究减伤曲线，发现在四区不加出1120属性，可以顺利买出地震卷轴，决战前的金币可近乎消耗完毕。4、【二区四区各加2攻】为常规路线，可在四区攻杀双手剑士，决战魔龙前有559防御，可近乎完美防杀大法师。【二区加2攻 四区全加防】路线在四区需硬刚双手剑士，但决战魔龙前有接近590+的防御，可大幅减伤魔龙。两条大路线最终成绩接近，需分别进行研究其中较高者即为41477血，总体规划难度偏高，但没有幸运金币适当降低了转换难度。
                  - text: 1-3【特性版-NE（最高血量）】29848血；
                  - text: 耗时：3小时（在旧版本30小时的基础上）
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段，思考中心对称飞行器、地震卷轴和炸弹的用法，大体估计二区和四区的加点次数范围。2、尝试【二区加2攻1防】和【二区加2攻】两条大路线分别研究，前者四区防御较少需绕骑士剑，后者四区防御较高可强冲骑士剑。3、先全局规划蓝钥匙的用法，再根据金币尾数调整黄钥匙用法，依靠幸运金币和黄钥匙买卖周转，尽可能将决战前的金币转换为血量。4、中期有两次强行凑钱，其中凑45F的950金币之前卖掉黄钥匙的多少才是决定最终剩余金币的关键（而非击杀非必经之路上的0伤怪物），在强行凑钱之前不能购买38F商人的200金币3黄钥匙。
                  - text: 1-4【特性版-TE（最高血量）】50675血；
                  - text: 耗时：15小时
                  - text: 难度评级：思路A，转换A
                  - text: 粗略思考路径：1、探路阶段发现，特性版TE不用面对强力boss，硬凑3红钥匙跳大法师可在后期将大量富裕金币用于加血，比常规的完美防杀大法师路线多出1700血左右。因此规划道具用法：地震卷轴震37F，破墙破35F偷雪花，上楼器拿神圣盾，下楼器用于封印魔王，第一次对称飞用于40F，后两次对称飞用于24F跳红门。2、二次探路发现，决战前加出2420档属性金币极为紧俏，因此需从头规划节省黄钥匙的方法，与血量进行转换。3、罗列二区加点策略，由于决战前不需要面对强力BOSS，偷神圣剑后所有怪物的一防减伤都较少，因此二区可大量加防规避伤害，但需要注意不能影响红钥匙的购买，在【二区加2攻2防】和【二区加2攻3防】两条之间大路线分别研究，并尝试【绕着拿骑士剑】与【硬冲骑士剑】两个方案与一区二区的黄钥匙取舍，比较并找出上述大路线下的最优钥匙分配思路，确定加点大路线。4、在优势路线下，调整蓝黄钥匙的使用方法，尽可能多拿血瓶的情况下消耗完金币，总体来说转换难度不高，重点在于钥匙金币规划估算。
                  - text: 2-1【纯净版-NE（最高攻击）】558攻；
                  - text: 耗时：10小时
                  - text: 难度评级：思路A，转换B
                  - text: 粗略思考路径：1、探路阶段发现，想加出4220档属性，必须放弃地震卷轴。需分为加出【买出4220金币+放弃地震】以及【买出3820金币+购买地震】两条大路线分别研究。2、二次探路发现，【买出4220金币+放弃地震】路线下，尝试四区加5次攻击，必须将破墙用于37F，但可将圣水留到决战前，然而金币的紧缺导致五区要直奔幸运金币增加大量损血，且决战前无法拿到37F另外三个格子中的血瓶，最终打不过魔王（若大黄门用在47F则差2000血）或（若大黄门用在41F则差1000血和400块钱）。3、【买出3820金币+购买地震】路线下，尝试四区加2次攻击，由于双手剑士临界需到39F拿完红宝石才能踩到，血量压力激增，必须提前喝圣水且购买31F的1000元钥匙，之后经尝试对称飞和破墙用法发现，将破墙用在48F取圣剑，对称飞用在40F、42F、48F可较早取得神圣盾，然后立即去取幸运金币可少受较多领域伤害，最终可剩余约100血战胜魔王，有一定转换难度。
                  - text: 结论：四区2次 破48F 买出3820档属性 买地震 对称飞用于40F\42f\48f
                  - text: 2-2【纯净版-TE（最高攻击）】523攻；
                  - text: 耗时：1小时
                  - text: 难度评级：思路D，转换D
                  - text: 粗略思考路径：1、探路阶段发现，想加出2740档属性，必须放弃地震卷轴，且由于放弃幸运金币，绝无可能加出3080属性。2、在加出2740档属性的基础上，尝试四区加两次攻击，破墙用于37F右下，发现只要注意转换，可以不加3%攻防前打过25F大法师，总体转换难度不大。
                  - text: 结论：四区2次 破37F 买出2740档属性 不买地震
                  - text: 尝试突破的废案：调整四区加点次数至1次，但由于无法偷剑损血过高，无法顺利通过四区。
                  - text: 2-3【特性版-NE（最高攻击）】569攻；
                  - text: 耗时：20小时
                  - text: 难度评级：思路B，转换A
                  - text: 粗略思考路径：1、探路阶段发现，想加出4220档属性+买地震卷轴，金币极为紧俏但收益巨大，前期需竭尽所能节省黄钥匙，并尽可能早冲到幸运金币处。2、仔细思考【破墙用于偷剑并买地震卷轴】与【破墙用于拿37F右下宝石并放弃地震】两个策略的区别，前者需多攒约2900金币，但明面上多拿4攻击，四区加点的压力更小。选择前者策略，四区加两次攻击再加利用圣水复活bug卡血，可先不拿骑士盾强冲到幸运金币处，勉强可凑够商店4220档；而选择后者策略，虽然金币压力大幅度减少，但四区后半段无法偷剑且四区商店无法加点，导致血量严重不足，难以实现过关目标。3、仔细思考是否购买12层红钥匙的区别，虽然明面上看不买红钥匙节省800块，但实际上多出的1红残局可换1黄，且中期缺少的红需到34F获取，失去了残局用大黄门钥匙开34F的机会，这一对比不买红钥匙仅赚100金币，无法弥补二区和四区多损失的血量。
                  - text: 结论：四区2次 破35F 买出4220档属性 买地震
                  - text: 尝试突破的废案：1、尝试同时再次压低四区加点至1次，但四区拿骑士剑时血量已被压到极限，难以再突破。2、尝试加出4640档金币，并在四区多加几次攻击，但目前金币已被压到极限，难以再突破。
                  - text: 2-4【特性版-TE（最高攻击）】534攻；
                  - text: 耗时：10小时
                  - text: 难度评级：思路C，转换B
                  - text: 粗略思考路径：1、探路阶段发现，想加出3080档属性，必须放弃地震卷轴，且由于放弃幸运金币，绝无可能加出3440属性。2、在加出3080档属性的基础上，尝试四区加两次攻击，破墙用于37F右下，虽然可以不加3%攻防前打过25F大法师，但在两三处地方存在卡血，总体转换难度偏高。
                  - text: 结论：四区2次 破37F 买出3080档属性 不买地震
                  - text: 尝试突破的废案：调整四区加点次数至1次，但由于损血过高，无法顺利通过四区。
                  - text: 3-1【纯净版-NE（最高防御）】744防；
                  - text: 耗时：5小时
                  - text: 难度评级：思路C，转换B
                  - text: 粗略思考路径：1、探路阶段发现，想加出4220档属性，必须放弃地震卷轴。2、由于纯净版无法偷剑，破墙最佳用点就在37F右下，因此残局再买地震的收益不高，因此主攻路线【买出4220金币+放弃地震】。3、尝试四区加4次防御，尽可能快取得幸运金币，转换难度一般（决战魔王后约有1500血盈余）。
                  - text: 结论：四区4次 破37F 买出4220档属性 不买地震
                  - text: 尝试突破的废案：尝试四区加3次防御，可将圣水留到决战前，然而防御不够导致四区无法直奔金币，最终决战前约差600金币。
                  - text: 3-2【纯净版-TE（最高防御）】653防；
                  - text: 耗时：2小时
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段发现，极限防御路线无法在不打假魔王的前提下战胜魔龙，因此必须买出地震卷轴，并放弃最后的2740档属性。2、在加出2420档属性和偷剑的基础上，尝试四区加2属性，只要提前喝圣水，则转换难度不大（打魔龙时卡攻击251，防御599，最终约2万血盈余）。
                  - text: 结论：四区2次 破37F 买出2420档属性 买地震；
                  - text: 尝试突破的废案：不买地震卷轴，而是将破墙用在37F右下，但爆防路线无法在不拿屠龙匕的情况下战胜魔龙。
                  - text: 3-3【特性版-NE（最高防御）】752防；
                  - text: 耗时：2小时（另有10小时尝试756防失败）
                  - text: 难度评级：思路C，转换C
                  - text: 粗略思考路径：1、探路阶段发现，想加出4220档属性同时舍弃地震卷轴，金币不算紧俏，因此以省血为主要目标，再尽可能早冲到幸运金币处。2、仔细思考【破墙用于偷剑并买地震卷轴】与【破墙用于拿37F右下宝石并放弃地震】两个策略的区别，前者需多攒约2900金币，但明面上多拿4防御，相同成绩下四区仅能多加一次。因此优先考虑后者策略。3、由于省血为主要目标，因此必买12层红钥匙的区别，大黄门钥匙开34F，四区喝蓝血瓶可硬撑过去，圣水留到决战前，则战胜魔王压力不大（约3500血盈余）。
                  - text: 结论：四区2次 破37F 买出4220档属性 不买地震。
